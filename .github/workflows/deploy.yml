name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "_bibliography/**"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "_plugins/**"
      - "_posts/**"
      - "_sass/**"
      - "assets/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "CNAME"
      - "robots.txt"
  pull_request:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "_bibliography/**"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "_plugins/**"
      - "_posts/**"
      - "_sass/**"
      - "assets/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "CNAME"
      - "robots.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler-cache: true
      - name: Install and Build 🔧
        run: |
          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
